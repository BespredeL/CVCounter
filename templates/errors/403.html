{% extends "base.html" %}

{% block title %}Forbidden{% endblock %}

{% block content %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-warning">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0"><i class="bi bi-shield-exclamation"></i> 403 - Forbidden</h4>
                    </div>
                    <div class="card-body">
                        <p class="lead">{{ trans('You do not have permission to access this resource.') }}</p>
                        {% if error.description %}
                            <p>{{ error.description }}</p>
                        {% endif %}
                        <hr>
                        <a href="{{ url_for('main.index') }}" class="btn btn-primary">{{ trans('Go to Home') }}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
