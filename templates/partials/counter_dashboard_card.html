<article class="counter-card counter-card--{{ status }}"         id="counter_card_{{ location|slug }}"         data-location="{{ location }}"         data-status="{{ status }}"         data-video-url="{{ url_for('counters.counter_video', location=location) }}"         data-text-url="{{ url_for('counters.counter_text', location=location) }}"         data-zone-url="{{ url_for('counters.counting_area_edit', location=location) }}"         data-bootstrap-url="{{ url_for('counters.counter_bootstrap', location=location) }}"         data-preview-url="{{ url_for('counters.counter_preview_image', location=location) }}"         data-resume-url="{{ url_for('counters.start_count', location=location) }}"         data-pause-url="{{ url_for('counters.pause_count', location=location) }}"         data-stop-url="{{ url_for('counters.stop_count', location=location) }}"         data-search-text="{{ (label ~ ' ' ~ location)|lower }}"         title="{{ location }}">    <div class="counter-card__preview">        {% if (counter_previews or {}).get(location) %}            <img class="counter-card__preview-img" data-role="preview" loading="lazy" alt=""                 src="{{ url_for('counters.counter_preview_image', location=location) }}">        {% else %}            <div class="counter-card__preview-placeholder" data-role="preview-placeholder" aria-hidden="true">                <svg width="40" height="40" fill="currentColor" viewBox="0 0 16 16">                    <path d="M0 5a2 2 0 0 1 2-2h7.5a2 2 0 0 1 1.983 1.738l3.11-1.382A1 1 0 0 1 16 4.269v7.462a1 1 0 0 1-1.406.913l-3.111-1.382A2 2 0 0 1 9.5 13H2a2 2 0 0 1-2-2zm11.5 5.175v3.376l-.001-.004-3.11-1.382-.014-.006-.014-.006-3.11-1.382-.004-.001-.004-.001v-3.376l.004.001 3.11 1.382.014.006.014.006 3.11 1.382.004.001.004-.001zm.5-3.108a1 1 0 0 0-.496-1.036L6 5.873v-.94A2 2 0 0 1 8 3h6a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-6a2 2 0 0 1-1.992-1.848l-.933-.467z"/>                </svg>            </div>        {% endif %}        <span class="counter-card__status-dot" data-role="status-dot" aria-hidden="true"></span>    </div>    <div class="counter-card__body">        <div class="counter-card__head">            <h3 class="counter-card__name">{{ label|striptags|title }}</h3>            <span class="counter-card__badge"                  data-role="status-badge">{{ trans('Counter stopped') if status == 'stopped' else (trans('Counter paused') if status == 'paused' else trans('Counter running')) }}</span>        </div>        <p class="counter-card__location text-muted">{{ location }}</p>        <div class="counter-card__actions">            <div class="btn-group counter-card__transport" role="group" aria-label="{{ trans('Counter control') }}">                <button type="button" class="btn counter-card__btn counter-card__toggle" data-role="toggle"                        title="{{ trans('Start counter') }}" aria-label="{{ trans('Start counter') }}">                    <svg class="icon-play" width="17" height="17" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">                        <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393"/>                    </svg>                    <svg class="icon-pause d-none" width="17" height="17" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">                        <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5"/>                    </svg>                </button>                <button type="button" class="btn counter-card__btn counter-card__stop" data-action="stop"                        title="{{ trans('Stop') }}" aria-label="{{ trans('Stop') }}"                        {% if status == 'stopped' %}disabled{% endif %}>                    <svg width="17" height="17" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">                        <path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5"/>                    </svg>                </button>            </div>            <div class="btn-group counter-card__open" role="group" aria-label="{{ trans('Open as') }}">                <button type="button" class="btn btn-primary counter-card__btn counter-card__launch" data-open-mode="video"                        title="{{ trans('Open video') }}">                    <svg width="17" height="17" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">                        <path fill-rule="evenodd"                              d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/>                        <path fill-rule="evenodd"                              d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h2.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V4.5a.5.5 0 0 0 1 0z"/>                    </svg>                    <span class="counter-card__launch-label">{{ trans('Open') }}</span>                </button>                <button type="button" class="btn btn-primary counter-card__btn dropdown-toggle dropdown-toggle-split"                        data-bs-toggle="dropdown" aria-expanded="false">                    <span class="visually-hidden">{{ trans('Open as') }}</span>                </button>                <ul class="dropdown-menu dropdown-menu-end counter-card__menu shadow">                    <li>                        <button type="button" class="dropdown-item" data-open-mode="video">{{ trans('Video') }}</button>                    </li>                    <li>                        <button type="button" class="dropdown-item" data-open-mode="text">{{ trans('Text') }}</button>                    </li>                    <li>                        <hr class="dropdown-divider">                    </li>                    <li>                        <button type="button" class="dropdown-item" data-action="settings">{{ trans('Settings') }}</button>                    </li>                </ul>            </div>        </div>    </div></article>
